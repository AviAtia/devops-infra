replicaCount: 1

image:
  repository: avrahamatia/sample-nodejs
  pullPolicy: Always
  tag: "1.0.6"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: nodejsapp.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

config:
  port: "8080"
