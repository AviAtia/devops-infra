replicaCount: 1

image:
  repository: avrahamatia/sample-nodejs
  pullPolicy: Always
  tag: "1.0.7"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: nodejsapp.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

config:
  port: "8080"

prometheus:
  alertmanager:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    persistentVolume:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
